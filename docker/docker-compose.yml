# Local development PostgreSQL for Penta.
# Integration tests use ephemeral testcontainers; this is the long-lived dev DB.
# Port 55432 avoids clashing with a host PostgreSQL on 5432.
services:
  postgres:
    image: postgres:16
    container_name: penta-pg16
    environment:
      POSTGRES_USER: penta
      POSTGRES_PASSWORD: penta
      POSTGRES_DB: penta_dev
    ports:
      - "55432:5432"
    volumes:
      - penta-pg16:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penta -d penta_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  penta-pg16:
