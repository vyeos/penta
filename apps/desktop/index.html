<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penta</title>
    <meta name="theme-color" content="#0e0d0b" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <!-- Clash Display + Switzer via Fontshare. TODO: self-host woff2 for the
         packaged desktop build (offline) per build policy; falls back to
         system-ui until then. JetBrains Mono is self-hosted via @fontsource. -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=switzer@400,500,600,700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Resolve theme before first paint to avoid a flash of the wrong mode.
      // Shares the `penta-theme` key with the marketing site.
      try {
        var t = localStorage.getItem("penta-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
